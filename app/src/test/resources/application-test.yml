# 上下文 smoke test 专用配置
# 替换所有需要真实外部服务的配置，使 Spring 上下文能在 CI 中正常加载

spring:
  # 用 H2 内存库替代 PostgreSQL，避免 CI 中依赖真实数据库
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  autoconfigure:
    exclude:
      # 直接排除 pgvector 自动配置：
      # PgVectorStore 在 @PostConstruct 中会执行 DDL（CREATE EXTENSION vector 等），
      # H2 不支持 pgvector 扩展。排除后由 @MockBean VectorStore 满足依赖注入。
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

  ai:
    openai:
      # 假 key：Spring AI 只在真正调用 API 时才验证，上下文加载时不会连接
      api-key: test-key-smoke-test

app:
  storage:
    endpoint: http://localhost:9999
    access-key: test
    secret-key: test
    bucket: test
    region: us-east-1
